name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────────
  # Lint — backend (ruff + mypy) and frontend (eslint + tsc)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python / Backend ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Ruff — lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff — format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: mypy — type check
        working-directory: backend
        run: uv run mypy app

      # ── Node.js / Frontend ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript — type check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Test — backend (pytest + coverage)
  # ──────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensalesclaw
          POSTGRES_PASSWORD: opensalesclaw
          POSTGRES_DB: opensalesclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opensalesclaw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://opensalesclaw:opensalesclaw@localhost:5432/opensalesclaw_test"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: '["http://localhost:3000"]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Run pytest with coverage
        working-directory: backend
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  # ──────────────────────────────────────────────
  # Test — frontend (tsc --noEmit; Vitest added later)
  # ──────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript — type check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Build — verify Docker images compile
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for compose build
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql+asyncpg://opensalesclaw:opensalesclaw@db:5432/opensalesclaw
          SECRET_KEY=ci-build-secret-key-not-for-production
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          CORS_ORIGINS=["http://localhost:3000"]
          POSTGRES_USER=opensalesclaw
          POSTGRES_PASSWORD=opensalesclaw
          POSTGRES_DB=opensalesclaw
          EOF

      - name: docker compose build
        run: docker compose build --no-cache
